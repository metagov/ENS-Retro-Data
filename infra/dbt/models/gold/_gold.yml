version: 2

models:
  - name: governance_activity
    description: "Unified governance activity combining Snapshot and Tally proposals"
    columns:
      - name: proposal_id
        tests:
          - not_null
          - unique
      - name: source
        tests:
          - not_null
          - accepted_values:
              values: ['snapshot', 'tally']
      - name: title
        tests:
          - not_null

  - name: governance_discourse_activity
    description: "Unified governance <-> discourse view: proposals joined to their forum topics and engagement metrics"
    columns:
      - name: source
        tests:
          - not_null
          - accepted_values:
              values: ['snapshot', 'tally']
      - name: proposal_id
        tests:
          - not_null
      - name: match_source
        tests:
          - not_null
          - accepted_values:
              values: ['field', 'body_regex', 'manual', 'unmatched']
      - name: has_forum_discussion
        tests:
          - not_null
      - name: topic_id
        tests:
          - relationships:
              to: ref('stg_forum_topics')
              field: topic_id
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - source
            - proposal_id

  - name: delegate_scorecard
    description: "Per-delegate scorecard with participation and influence metrics"
    columns:
      - name: address
        tests:
          - not_null
          - unique
      - name: voting_power
        tests:
          - not_null

  - name: treasury_summary
    description: "Treasury flows aggregated by month and category, sourced from ENS Foundation labeled ledger (2022–2025). Amounts in USD."
    columns:
      - name: period
        tests:
          - not_null
      - name: category
        tests:
          - not_null
      - name: inflows_usd
        tests:
          - not_null
      - name: outflows_usd
        tests:
          - not_null
      - name: net_usd
        tests:
          - not_null
      - name: internal_transfer_usd
        tests:
          - not_null

  - name: participation_index
    description: "Composite participation metrics including Gini coefficient"
    columns:
      - name: metric
        tests:
          - not_null
          - unique
      - name: value
        tests:
          - not_null

  - name: decentralization_index
    description: "Power distribution metrics: Nakamoto, HHI, delegation concentration"
    columns:
      - name: metric
        tests:
          - not_null
          - unique
      - name: value
        tests:
          - not_null
