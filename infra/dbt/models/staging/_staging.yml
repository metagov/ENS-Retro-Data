version: 2

models:
  - name: stg_snapshot_proposals
    description: "Staged Snapshot governance proposals"
    columns:
      - name: proposal_id
        description: "Unique Snapshot proposal identifier"
        tests:
          - not_null
          - unique
      - name: author_address
        tests:
          - not_null
      - name: status
        tests:
          - not_null

  - name: stg_snapshot_votes
    description: "Staged Snapshot individual votes"
    columns:
      - name: vote_id
        description: "Unique vote identifier"
        tests:
          - not_null
          - unique
      - name: voter
        tests:
          - not_null
      - name: proposal_id
        tests:
          - not_null

  - name: stg_tally_proposals
    description: "Staged Tally on-chain governance proposals"
    columns:
      - name: proposal_id
        description: "Unique Tally proposal identifier"
        tests:
          - not_null
          - unique
      - name: status
        tests:
          - not_null

  - name: stg_tally_votes
    description: "Staged Tally individual votes"
    columns:
      - name: vote_id
        description: "Unique vote identifier"
        tests:
          - not_null
          - unique
      - name: voter
        tests:
          - not_null
      - name: proposal_id
        tests:
          - not_null

  - name: stg_tally_delegates
    description: "Staged Tally delegate profiles"
    columns:
      - name: address
        description: "Delegate Ethereum address"
        tests:
          - not_null
          - unique

  - name: stg_votingpower_delegates
    description: "Staged votingpower.xyz delegate export"
    columns:
      - name: delegate_address
        description: "Delegate Ethereum address"
        tests:
          - not_null
          - unique
      - name: rank
        tests:
          - not_null

  # --- On-chain, financial, grants, forum staging models ---
  # severity:warn used defensively for sources that may have transient gaps.
  # Data is real for everything except stg_delegate_profiles (interviews not indexed).

  - name: stg_delegations
    description: "Raw on-chain delegation events from Etherscan DelegateChanged logs"
    columns:
      - name: delegator
        tests:
          - not_null:
              severity: warn
      - name: delegate
        tests:
          - not_null:
              severity: warn

  - name: stg_token_distribution
    description: "Raw token distribution snapshot from Etherscan Transfer events"
    columns:
      - name: address
        description: "Token holder address"
        tests:
          - not_null:
              severity: warn
          - unique:
              severity: warn

  - name: stg_ens_ledger
    description: "Staged ENS Foundation labeled transaction ledger (CSV)"
    columns:
      - name: tx_hash
        tests:
          - not_null
      - name: tx_date
        tests:
          - not_null
      - name: category
        tests:
          - not_null
      - name: amount
        tests:
          - not_null
      - name: value_usd
        tests:
          - not_null

  - name: stg_treasury_flows
    description: "Staged treasury transaction flows (on-chain raw data)"
    columns:
      - name: tx_hash
        description: "Transaction hash"
        tests:
          - not_null:
              severity: warn
          - unique:
              severity: warn
      - name: from_address
        tests:
          - not_null:
              severity: warn

  - name: stg_grants
    description: "Raw grants data — large grants from the ENS ledger via the source macro indirection (bronze/grants/large_grants.json)"
    columns:
      - name: grant_id
        description: "Grant identifier"
        tests:
          - not_null:
              severity: warn
          - unique:
              severity: warn

  - name: stg_compensation
    description: "Raw compensation records for ENS DAO contributors and stewards"
    columns:
      - name: recipient_address
        tests:
          - not_null:
              severity: warn

  - name: stg_delegate_profiles
    description: "Staged delegate profile data — PLACEHOLDER. Source file bronze/interviews/delegate_profiles.json is not yet indexed; this model will fail at dbt build until the file exists. No silver model exists yet."
    columns:
      - name: address
        description: "Delegate address"
        tests:
          - not_null:
              severity: warn

  - name: stg_forum_posts
    description: "Raw governance forum posts from discuss.ens.domains via Discourse API"
    columns:
      - name: post_id
        description: "Forum post identifier"
        tests:
          - not_null:
              severity: warn
          - unique:
              severity: warn

  - name: stg_oso_ens_repos
    description: "Staged OSO ENS GitHub repository registry"
    columns:
      - name: artifact_id
        description: "OSO artifact identifier"
        tests:
          - not_null
          - unique:
              severity: warn
      - name: artifact_name
        tests:
          - not_null

  - name: stg_oso_ens_code_metrics
    description: "Staged OSO per-repo code health metrics"
    columns:
      - name: artifact_id
        description: "OSO artifact identifier"
        tests:
          - not_null
          - unique
      - name: artifact_name
        tests:
          - not_null

  - name: stg_oso_ens_timeseries
    description: "Staged OSO daily GitHub event history for ENS repos"
    columns:
      - name: artifact_id
        tests:
          - not_null
      - name: event_type
        tests:
          - not_null
      - name: event_time
        tests:
          - not_null
