<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="openai-chatkit-domain-key" content="domain_pk_69d4b7e70f4c8196afc6427fb78932ed0a3e9730a6acc6cc">
<!-- Warm up the OpenAI CDN connection (DNS + TLS) so when the user clicks
     the bubble, chatkit.js + the 3.8MB inner bundle start downloading
     immediately instead of waiting on a fresh handshake. -->
<link rel="preconnect" href="https://cdn.platform.openai.com" crossorigin>
<link rel="dns-prefetch" href="https://cdn.platform.openai.com">
<title>ENS Data Assistant</title>
<!-- chatkit.js is lazy-loaded inside mountChatKit() to avoid fetching it on
     every dashboard page render. Only loads when the user clicks the bubble. -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    font-family: system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }

  /* ---- Bubble ---- */
  #ens-bubble {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #3B4EC8;
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(59,78,200,0.4);
    font-size: 22px;
    z-index: 10;
    transition: background 0.2s, transform 0.2s;
  }
  #ens-bubble:hover { background: #2D3DAF; transform: scale(1.07); }
  #ens-bubble.open { transform: rotate(90deg); font-size: 24px; }

  /* ---- Panel ---- */
  #ens-panel {
    position: fixed;
    bottom: 84px;
    right: 24px;
    width: 400px;
    height: 560px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    border: 1px solid #E2E8F0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 9;
    /* Slide-up animation */
    opacity: 0;
    transform: translateY(16px) scale(0.96);
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  #ens-panel.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  /* ---- Header ---- */
  #ens-header {
    background: #3B4EC8;
    color: white;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #ens-header-title {
    font-weight: 600;
    font-size: 14px;
  }
  #ens-header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #ens-header-actions button {
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    opacity: 0.7;
    padding: 2px 6px;
    font-size: 14px;
    line-height: 1;
    transition: opacity 0.15s;
  }
  #ens-header-actions button:hover { opacity: 1; }
  #ens-close { font-size: 18px; }

  /* ---- ChatKit container ---- */
  #ens-chatkit {
    flex: 1;
    overflow: hidden;
    min-height: 0;
    position: relative;
  }
  #ens-chatkit openai-chatkit {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ---- Loading skeleton ---- */
  #ens-loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: #A0AEC0;
    font-size: 13px;
    transition: opacity 0.3s;
  }
  #ens-loading.hidden { opacity: 0; pointer-events: none; }
  .ens-spinner {
    width: 28px;
    height: 28px;
    border: 3px solid #E2E8F0;
    border-top-color: #3B4EC8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<button id="ens-bubble" title="Ask ENS Data">&#x1F4AC;</button>

<div id="ens-panel">
  <div id="ens-header">
    <span id="ens-header-title">ENS Data Assistant</span>
    <div id="ens-header-actions">
      <button id="ens-expand" title="Open full page">&#x26F6;</button>
      <button id="ens-close" title="Close">&#xD7;</button>
    </div>
  </div>
  <div id="ens-chatkit">
    <div id="ens-loading">
      <div class="ens-spinner"></div>
      <span>Waking up ENS Data Assistant…</span>
    </div>
  </div>
</div>

<script>
(function () {
  // ---- 1. Position iframe ----
  var fr = window.frameElement;
  if (fr) {
    var sp = fr.style.setProperty.bind(fr.style);
    sp('position',   'fixed',       'important');
    sp('bottom',     '0',           'important');
    sp('right',      '0',           'important');
    sp('width',      '480px',       'important');
    sp('height',     '680px',       'important');
    sp('z-index',    '2147483647',  'important');
    sp('border',     'none',        'important');
    sp('background', 'transparent', 'important');
  }

  // ---- 2. Read secret ----
  var secret = window.location.hash.substring(1);
  if (!secret) {
    document.getElementById('ens-bubble').style.display = 'none';
    return;
  }
  // Strip secret from URL bar + browser history
  if (window.history && window.history.replaceState) {
    window.history.replaceState(null, '', window.location.pathname);
  }

  // ---- 3. Toggle ----
  var panel = document.getElementById('ens-panel');
  var bubble = document.getElementById('ens-bubble');
  var mounted = false;

  function toggle() {
    var isOpen = panel.classList.contains('open');
    if (!isOpen) {
      panel.classList.add('open');
      bubble.classList.add('open');
      bubble.innerHTML = '&#xD7;';
      if (!mounted) mountChatKit();
    } else {
      panel.classList.remove('open');
      bubble.classList.remove('open');
      bubble.innerHTML = '&#x1F4AC;';
    }
  }

  bubble.addEventListener('click', toggle);
  document.getElementById('ens-close').addEventListener('click', toggle);

  // ---- 4. Expand — pass same secret so ChatKit resumes the thread ----
  document.getElementById('ens-expand').addEventListener('click', function () {
    var base = window.parent ? window.parent.location.origin : window.location.origin;
    window.open(base + '/app/static/chatpage.html#' + secret, '_blank');
  });

  // ---- 5. Mount ChatKit (lazy-loads chatkit.js on first click) ----
  function mountChatKit() {
    var container = document.getElementById('ens-chatkit');
    var loader = document.getElementById('ens-loading');

    function createElement() {
      var el = document.createElement('openai-chatkit');
      el.style.cssText = 'width:100%;height:100%;display:block;';
      container.appendChild(el);
      el.setOptions({
        api: {
          getClientSecret: async function () { return secret; }
        },
        theme: {
          colorScheme: 'light',
          density: 'compact',
          radius: 'soft'
        }
      });
      mounted = true;
      // Hide loading after ChatKit renders (give it a moment)
      setTimeout(function () { loader.classList.add('hidden'); }, 1500);
    }

    // Lazy-load chatkit.js the first time the bubble is opened
    if (window.customElements && window.customElements.get('openai-chatkit')) {
      createElement();
      return;
    }
    var script = document.createElement('script');
    script.src = 'https://cdn.platform.openai.com/deployments/chatkit/chatkit.js';
    script.onload = createElement;
    script.onerror = function () {
      loader.querySelector('span').textContent = 'Failed to load chat — please refresh';
    };
    document.head.appendChild(script);
  }
})();
</script>
</body>
</html>
