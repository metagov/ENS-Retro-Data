<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ENS Data Assistant</title>
<script src="https://cdn.platform.openai.com/deployments/chatkit/chatkit.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: white;
    font-family: system-ui, -apple-system, sans-serif;
  }
  openai-chatkit {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<script>
(function () {
  var secret = window.location.hash.substring(1);
  if (!secret) {
    document.body.innerHTML = '<p style="padding:24px;color:#718096;">Chat session not available. Reload the page.</p>';
    return;
  }

  var el = document.createElement('openai-chatkit');
  el.style.cssText = 'width:100%;height:100%;display:block;';
  document.body.appendChild(el);
  el.setOptions({
    api: {
      getClientSecret: async function () { return secret; }
    },
    theme: {
      colorScheme: 'light',
      density: 'normal',
      radius: 'soft'
    }
  });
})();
</script>
</body>
</html>
