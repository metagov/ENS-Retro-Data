<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="openai-chatkit-domain-key" content="domain_pk_69d4b7e70f4c8196afc6427fb78932ed0a3e9730a6acc6cc">
<!-- Warm up the OpenAI CDN connection (DNS + TLS) before chatkit.js starts
     downloading. Saves the handshake roundtrip on the critical path. -->
<link rel="preconnect" href="https://cdn.platform.openai.com" crossorigin>
<link rel="dns-prefetch" href="https://cdn.platform.openai.com">
<!-- Start fetching chatkit.js immediately on HTML parse instead of waiting
     for the JS to dynamically inject the script tag. -->
<link rel="preload" as="script" href="https://cdn.platform.openai.com/deployments/chatkit/chatkit.js" crossorigin>
<title>ENS Data Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: white;
    font-family: system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }
  openai-chatkit {
    display: block;
    width: 100%;
    height: 100%;
  }
  #ens-loading {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: #4A5568;
    font-size: 15px;
    background: white;
    transition: opacity 0.3s;
    z-index: 100;
  }
  #ens-loading.hidden { opacity: 0; pointer-events: none; }
  .ens-spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #E2E8F0;
    border-top-color: #3B4EC8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="ens-loading">
  <div class="ens-spinner"></div>
  <span>Waking up ENS Data Assistant…</span>
</div>
<script>
(function () {
  var secret = window.location.hash.substring(1);
  if (!secret) {
    document.body.innerHTML = '<p style="padding:24px;color:#718096;">Chat session not available. Reload the page.</p>';
    return;
  }
  // Strip secret from URL bar + browser history
  if (window.history && window.history.replaceState) {
    window.history.replaceState(null, '', window.location.pathname);
  }

  // Starter prompts — randomized pool (4 shown per session)
  var STARTER_PROMPT_POOL = [
    { label: 'Low-turnout proposals',   prompt: 'Which ENS proposals had the lowest voter turnout in the last year, and what did they have in common?' },
    { label: 'Complexity vs turnout',   prompt: 'Do more complex proposals get fewer votes? Show me the correlation.' },
    { label: 'Top 10 active delegates', prompt: 'Who are the top 10 most active delegates by voting frequency?' },
    { label: 'Inactive delegates',      prompt: 'Show me delegates who stopped participating in the last 6 months.' },
    { label: 'Divergent voters',        prompt: 'Find delegates whose voting patterns diverge most from the majority.' },
    { label: 'Hot forum threads',       prompt: 'Which forum threads led to actual on-chain proposals?' },
    { label: 'Forum topics this quarter', prompt: 'What topics dominated ENS forum discussions last quarter?' },
    { label: 'Grants breakdown',        prompt: 'How much has the ENS DAO spent on grants in the past year, broken down by category?' },
    { label: 'Proposal type pass rates', prompt: 'Which proposal types (treasury, governance, social) pass most often?' },
    { label: 'DAO health summary',      prompt: 'Give me a 30-second summary of ENS DAO health right now.' }
  ];

  function pickStarterPrompts(n) {
    var pool = STARTER_PROMPT_POOL.slice();
    for (var i = pool.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
    }
    return pool.slice(0, n);
  }

  function createElement() {
    var el = document.createElement('openai-chatkit');
    el.style.cssText = 'width:100%;height:100%;display:block;';
    document.body.appendChild(el);
    el.setOptions({
      api: {
        getClientSecret: async function () { return secret; }
      },
      theme: {
        colorScheme: 'light',
        density: 'normal',
        radius: 'soft'
      },
      startScreen: {
        greeting: 'Ask about ENS governance',
        prompts: pickStarterPrompts(4)
      }
    });
    setTimeout(function () {
      var loader = document.getElementById('ens-loading');
      if (loader) loader.classList.add('hidden');
    }, 1500);
  }

  // Lazy-load chatkit.js — crossorigin must match the <link rel="preload">
  // in <head> so the browser dedupes against the preload cache instead of
  // fetching the script twice (preload + dynamic injection).
  var script = document.createElement('script');
  script.crossOrigin = 'anonymous';
  script.src = 'https://cdn.platform.openai.com/deployments/chatkit/chatkit.js';
  script.onload = createElement;
  script.onerror = function () {
    document.querySelector('#ens-loading span').textContent = 'Failed to load chat — please refresh';
  };
  document.head.appendChild(script);
})();
</script>
</body>
</html>
