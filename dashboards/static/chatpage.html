<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ENS Data Assistant</title>
<script src="https://cdn.platform.openai.com/deployments/chatkit/chatkit.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: white;
    font-family: system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }
  openai-chatkit {
    display: block;
    width: 100%;
    height: 100%;
  }
  #back-link {
    position: fixed;
    top: 12px;
    left: 16px;
    z-index: 100;
    color: #718096;
    text-decoration: none;
    font-size: 13px;
    font-family: system-ui, -apple-system, sans-serif;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(4px);
    padding: 6px 12px;
    border-radius: 8px;
    transition: color 0.15s, background 0.15s;
  }
  #back-link:hover {
    color: #3B4EC8;
    background: rgba(255,255,255,0.95);
  }
</style>
</head>
<body>
<a id="back-link" href="/" target="_top">&larr; Dashboard</a>
<script>
(function () {
  var secret = window.location.hash.substring(1);
  if (!secret) {
    document.body.innerHTML = '<p style="padding:24px;color:#718096;">Chat session not available. Reload the page.</p>';
    return;
  }

  var el = document.createElement('openai-chatkit');
  el.style.cssText = 'width:100%;height:100%;display:block;';
  document.body.appendChild(el);
  el.setOptions({
    api: {
      getClientSecret: async function () { return secret; }
    },
    theme: {
      colorScheme: 'light',
      density: 'normal',
      radius: 'soft'
    }
  });
})();
</script>
</body>
</html>
