# fly.toml app configuration file generated for ens-retro-data on 2026-03-24T00:28:18+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ens-retro-data'
primary_region = 'bom'

[build]

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[http_service.checks]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/"
  timeout = "10s"
