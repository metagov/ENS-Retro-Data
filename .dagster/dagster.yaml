run_storage:
  module: dagster.core.storage.runs
  class: SqliteRunStorage
  config:
    base_dir: .dagster/storage

event_log_storage:
  module: dagster.core.storage.event_log
  class: SqliteEventLogStorage
  config:
    base_dir: .dagster/storage

schedule_storage:
  module: dagster.core.storage.schedules
  class: SqliteScheduleStorage
  config:
    base_dir: .dagster/storage

# Auto-delete runs older than 7 days, keeping at least the last 10
run_retries:
  max_retries: 0

retention:
  schedule:
    purge_after_days: 90
  sensor:
    purge_after_days: 90
  auto_materialize:
    purge_after_days: 90
