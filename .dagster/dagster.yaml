run_storage:
  module: dagster.core.storage.runs
  class: SqliteRunStorage
  config:
    base_dir: .dagster/storage

event_log_storage:
  module: dagster.core.storage.event_log
  class: SqliteEventLogStorage
  config:
    base_dir: .dagster/storage

schedule_storage:
  module: dagster.core.storage.schedules
  class: SqliteScheduleStorage
  config:
    base_dir: .dagster/storage

# Cap parallel steps to avoid SQLite "database is locked" errors.
# SQLite can't handle many concurrent writers; limiting to 4 keeps it stable.
concurrency:
  runs:
    max_concurrent_runs: 4

run_retries:
  max_retries: 3

retention:
  schedule:
    purge_after_days: 90
  sensor:
    purge_after_days: 90
  auto_materialize:
    purge_after_days: 90

code_servers:
  local_startup_timeout: 3600
